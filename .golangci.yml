version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - dogsled
  # - dupl
    - errcheck
    - funlen
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
  # - lll
  # - misspell
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  # - godox
  # - maligned
    - prealloc

  # don't enable:
  # - gochecknoglobals
  # - nakedret
  # - gochecknoinits

  exclusions:
    presets:
      - std-error-handling # prevents linter issues on not checking r.Body.Close 's return values

  settings:
    govet:
      enable:
        - shadow
    golint:
      min-confidence: 0
    gocyclo:
      min-complexity: 25
    maligned:
      suggest-new: true
    goconst:
      min-len: 2
      min-occurrences: 4
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - unnamedResult
        - commentedOutCode
        - exitAfterDefer # TODO: Investigate re-enabling this one
        - filepathJoin   # Disabled due to FPs in config package
        - appendCombine  # After a longer thought I decided I don't like this, makes code less readable
    funlen:
      lines: 200
      statements: 60

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports: {}
