name: Lint

on:
  push:
    branches: [ master ]
    tags:
      - "v*"
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go: ["oldstable", "stable"]

    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Check out into the Go module directory
        uses: actions/checkout@v6

      # review dog doesn't work with oldstable/stable versions
      # for now, just use regular linter action; maybe reviewdog can be dropped altogether
      #- name: Lint the code (reviewdog)
        #uses: reviewdog/action-golangci-lint@v2.8.0
        #with:
          #fail_on_error: true
          #go_version: ${{ matrix.go }}
          #filter_mode: nofilter
      - name: Lint the code
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.1
